<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.x, .cell.o { font-size: 3.5rem; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #score {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label {
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }

    .score-box .num {
      font-size: 2rem;
      font-weight: bold;
    }

    .score-box.x-score .num { color: #e94560; }
    .score-box.o-score .num { color: #a8dadc; }
    .score-box.tie-score .num { color: #888; }

    #modeSelector {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      z-index: 1000;
    }

    #modeSelector.hidden {
      display: none;
    }

    .mode-title {
      font-size: 2rem;
      color: #e94560;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .mode-buttons {
      display: flex;
      gap: 2rem;
    }

    .mode-btn {
      padding: 1rem 2rem;
      font-size: 1.1rem;
      background: #16213e;
      color: #eee;
      border: 2px solid #e94560;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .mode-btn:hover {
      background: #e94560;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="modeSelector">
    <div class="mode-title">Choose Game Mode</div>
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="manual">Manual (2 Players)</button>
      <button class="mode-btn" data-mode="ai">vs AI</button>
    </div>
  </div>

  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-box x-score">
      <div class="label">🍎</div>
      <div class="num" id="score-x">0</div>
    </div>
    <div class="score-box tie-score">
      <div class="label">Ties</div>
      <div class="num" id="score-tie">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">🍊</div>
      <div class="num" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const PLAYERS = { X: '🍎', O: '🍊' };
    let board, current, over, gameMode, gameCount;
    let scores = { X: 0, O: 0, tie: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const modeSelector = document.getElementById('modeSelector');

    function init() {
      board = Array(9).fill('');
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });

      // Alternate first player in AI mode
      if (gameMode === 'ai') {
        gameCount++;
        current = gameCount % 2 === 1 ? 'X' : 'O';
      } else {
        current = 'X';
      }

      status.textContent = `${PLAYERS[current]}'s turn`;

      // AI goes first
      if (gameMode === 'ai' && current === 'O') {
        setTimeout(() => {
          const move = aiMove();
          playMove(move);
        }, 500);
      }
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-tie').textContent = scores.tie;
    }

    function getAvailableMoves() {
      return board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
    }

    function countLine(line, player) {
      return line.filter(i => board[i] === player).length;
    }

    function aiMove() {
      const available = getAvailableMoves();

      // Check if AI can win
      for (const move of available) {
        board[move] = 'O';
        if (checkWin()) {
          board[move] = '';
          return move;
        }
        board[move] = '';
      }

      // Check if need to block player
      for (const move of available) {
        board[move] = 'X';
        if (checkWin()) {
          board[move] = '';
          return move;
        }
        board[move] = '';
      }

      // Score remaining moves
      const scores = available.map(move => {
        let score = 0;
        board[move] = 'O';

        // Prefer center
        if (move === 4) score += 20;
        // Prefer corners
        else if ([0, 2, 6, 8].includes(move)) score += 15;
        // Prefer edges
        else score += 10;

        // Count potential winning lines
        for (const line of WINS) {
          if (line.includes(move)) {
            const o_count = countLine(line, 'O');
            const x_count = countLine(line, 'X');
            if (x_count === 0) score += o_count * 8;
            if (o_count === 0) score += x_count * 5;
          }
        }

        board[move] = '';
        return { move, score };
      });

      scores.sort((a, b) => b.score - a.score);

      // 25% chance to pick a good move instead of best move (makes it beatable)
      const topMoves = scores.slice(0, 3);
      if (Math.random() < 0.25 && topMoves.length > 1) {
        return topMoves[Math.floor(Math.random() * topMoves.length)].move;
      }

      return scores[0].move;
    }

    function playMove(i) {
      if (over || board[i]) return;

      board[i] = current;
      cells[i].textContent = PLAYERS[current];
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        over = true;
        win.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `${PLAYERS[current]} wins!`;
        scores[current]++;
        updateScores();
      } else if (board.every(v => v)) {
        over = true;
        status.textContent = "It's a tie!";
        scores.tie++;
        updateScores();
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${PLAYERS[current]}'s turn`;

        // AI move in AI mode
        if (gameMode === 'ai' && current === 'O') {
          setTimeout(() => {
            const move = aiMove();
            playMove(move);
          }, 500);
        }
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameMode === 'ai' && current === 'O') return;
        playMove(i);
      });
    });

    // Mode selection
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        gameMode = e.target.dataset.mode;
        gameCount = 0;
        modeSelector.classList.add('hidden');
        init();
      });
    });

    document.getElementById('restart').addEventListener('click', () => {
      if (gameMode) {
        init();
      } else {
        modeSelector.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
